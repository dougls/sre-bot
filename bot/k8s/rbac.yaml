apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-ai-bot-role
rules:
- apiGroups: [""]
  resources: ["pods", "events", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-ai-bot-binding
subjects:
- kind: ServiceAccount
  name: sre-ai-bot
  namespace: default
roleRef:
  kind: ClusterRole 
  name: sre-ai-bot-role 
  apiGroup: rbac.authorization.k8s.io